[variables]
NIXPACKS_PHP_EXTENSIONS = "pdo_mysql,mbstring,xml,bcmath,curl,tokenizer,openssl,fileinfo"
NIXPACKS_PHP_ROOT_DIR   = "public"

[phases.install]
cmds = [
  "composer update nette/schema nette/utils league/config --no-scripts --no-interaction",
  "composer install --optimize-autoloader --no-scripts --no-interaction"
]

[start]
cmd = "php artisan migrate --force && apache2-foreground"
